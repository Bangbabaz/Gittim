name: Build & Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    env:
      # MSVC 中文代码页不识别 whisper.cpp 的 UTF-8 源文件，必须在编译
      # 时加 /utf-8。non-Windows 平台无害（env var 被忽略）。
      CL: /utf-8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HF_MIRROR: hf-mirror.com

      - name: Build & Publish
        run: yarn build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_MIRROR: hf-mirror.com
